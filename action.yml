name: 'GitHub Actions Version Audit'
description: 'Audit outdated GitHub Actions versions, mutable tags, and CI/CD supply-chain drift.'
author: 'Varun Chandak'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  github_token:
    description: 'GitHub token used to query release metadata. Defaults to the workflow GITHUB_TOKEN.'
    required: false
    default: ${{ github.token }}
  slack_webhook_url:
    description: 'Slack incoming webhook URL for notifications.'
    required: false
  workflows_dir:
    description: 'The directory to scan for workflow YAML files.'
    required: false
    default: '.github/workflows'
  skip_prefixes:
    description: 'Comma-separated prefixes of "uses:" strings to ignore (e.g., internal actions).'
    required: false
    default: './'
  create_pr:
    description: 'Whether to patch workflow files and open a pull request for findings.'
    required: false
    default: 'false'
  git_push_token:
    description: 'GitHub App or PAT token with contents:write and workflows permission, used to commit workflow file updates and tried first for PR lookup and creation. If omitted, falls back to github_token.'
    required: false
  pr_branch:
    description: 'Branch name to create or update when create_pr is true.'
    required: false
    default: 'github-actions-version-audit'
  pr_base:
    description: 'Base branch for pull requests when create_pr is true. Defaults to main; pass the repository default branch expression from the caller workflow to avoid hardcoding.'
    required: false
    default: 'main'

runs:
  using: 'composite'
  steps:
    - name: Run Version Audit
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        SLACK_WEBHOOK_URL: ${{ inputs.slack_webhook_url }}
        WORKFLOWS_DIR: ${{ inputs.workflows_dir }}
        SKIP_PREFIXES: ${{ inputs.skip_prefixes }}
        CREATE_PR: ${{ inputs.create_pr }}
        GIT_PUSH_TOKEN: ${{ inputs.git_push_token }}
        PR_BRANCH: ${{ inputs.pr_branch }}
        PR_BASE: ${{ inputs.pr_base }}
      run: python3 ${{ github.action_path }}/github-actions-version-audit.py
